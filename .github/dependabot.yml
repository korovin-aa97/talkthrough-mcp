# Weekly, grouped into single PRs to keep solo-maintainer noise low.
# Dependabot PRs come from github, run CI, and merge via squash like any PR.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns: ["*"]
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 2
