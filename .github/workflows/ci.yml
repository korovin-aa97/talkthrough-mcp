name: ci

on:
  push:
    branches: [main]
  pull_request:

# Explicit least privilege (the repo default is read-only too; this survives
# a default change and satisfies Scorecard's Token-Permissions check).
permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TALKTHROUGH_WHISPER_MODEL: tiny
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Cache whisper model + venv (static-ffmpeg/OCR binaries live inside)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cache/huggingface
            .venv
          key: ${{ runner.os }}-talkthrough-${{ hashFiles('uv.lock') }}
      - name: Cache diarization models (URLs + sha256 are pinned, assets immutable)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/talkthrough-test-models
          key: ${{ runner.os }}-diarize-models-v1
      - run: uv sync --frozen --extra diarization
      - run: uv run ruff check
      - run: uv run mypy src
      - run: uv run pytest tests/unit -q
      - run: uv run pytest tests/integration -q
      - run: uv run pytest tests/e2e -q

  macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run pytest tests/unit -q

  # Best-effort (issue #1): not a required check, but keeps the Windows path
  # honest — imports, unit suite, and a real CLI smoke over the fixture
  # (static-ffmpeg Windows build + whisper tiny + OCR + idempotent re-run).
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      TALKTHROUGH_WHISPER_MODEL: tiny
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Cache whisper model
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-talkthrough-${{ hashFiles('uv.lock') }}
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run pytest tests/unit -q
      - name: CLI smoke on the committed fixture
        run: uv run talkthrough-mcp process tests/fixtures/talkthrough-demo.mp4
      - name: Idempotent re-run returns instantly
        run: uv run talkthrough-mcp process tests/fixtures/talkthrough-demo.mp4
