name: ci

on:
  push:
    branches: [main]
  pull_request:

# Explicit least privilege (the repo default is read-only too; this survives
# a default change and satisfies Scorecard's Token-Permissions check).
permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TALKTHROUGH_WHISPER_MODEL: tiny
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - name: Cache whisper model + venv (static-ffmpeg/OCR binaries live inside)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cache/huggingface
            .venv
          key: ${{ runner.os }}-talkthrough-${{ hashFiles('uv.lock') }}
      - name: Cache diarization models (URLs + sha256 are pinned, assets immutable)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/talkthrough-test-models
          # v2: default embedding model switched to nemo_en_titanet_small
          key: ${{ runner.os }}-diarize-models-v2
      - run: uv sync --frozen --extra diarization
      - run: uv run ruff check
      - run: uv run mypy src
      - run: uv run pytest tests/unit -q
      - run: uv run pytest tests/integration -q
      - run: uv run pytest tests/e2e -q

  macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run pytest tests/unit -q

  # Keeps the Windows path honest (issue #1): imports, unit suite, and a real
  # CLI smoke over the fixture (static-ffmpeg Windows build + whisper tiny +
  # OCR + idempotent re-run), plus a diarize smoke through the native
  # sherpa-onnx stack (the System32-onnxruntime DLL clash class breaks HERE,
  # not at users'). Required branch check since v0.2.2 (2026-07-18), together
  # with linux and macos — its first day on duty it caught a real
  # Windows-only path bug, which settled the promotion debate.
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      TALKTHROUGH_WHISPER_MODEL: tiny
      # summaries carry non-ASCII (em-dashes, RU/JA text); without UTF-8 mode
      # a redirected stdout falls back to cp1252 and the smoke JSON is garbage
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - name: Cache whisper model
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-talkthrough-${{ hashFiles('uv.lock') }}
      - name: Cache diarization models (URLs + sha256 are pinned, assets immutable)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .talkthrough-ci/models
          # v2: default embedding model switched to nemo_en_titanet_small
          key: ${{ runner.os }}-diarize-models-v2
      - run: uv sync --frozen --extra diarization
      - run: uv run ruff check
      - run: uv run pytest tests/unit -q
      - name: CLI smoke on the committed fixture
        run: uv run talkthrough-mcp process tests/fixtures/talkthrough-demo.mp4
      - name: Idempotent re-run returns instantly
        run: uv run talkthrough-mcp process tests/fixtures/talkthrough-demo.mp4
      - name: Diarize smoke on the two-voice fixture
        shell: bash
        env:
          TALKTHROUGH_HOME: ${{ github.workspace }}/.talkthrough-ci
        run: >
          uv run talkthrough-mcp process --json --diarize --num-speakers 2
          tests/fixtures/meeting-two-voices.m4a > diarize-smoke.json
      - name: Assert speakers actually landed (engine failures degrade, not exit non-zero)
        shell: bash
        run: |
          uv run python - <<'EOF'
          import json
          summary = json.load(open("diarize-smoke.json", encoding="utf-8"))
          block = summary["diarization"]
          assert block["available"] is True, block
          assert block["detected_num_speakers"] == 2, block
          labels = [speaker["label"] for speaker in block["speakers"]]
          assert labels == ["S1", "S2"], labels
          print("diarize smoke OK:", labels)
          EOF
