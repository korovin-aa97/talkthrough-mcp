# Release: build + publish to PyPI (Trusted Publishing) + GitHub Release.
#
# Triggered ONLY by pushing a version tag (v0.1.0, …). Nothing runs while the
# repo has no tags, so committing this workflow is inert until flip day.
#
# ONE-TIME MANUAL SETUP before the first tag (flip day):
#   pypi.org → account → Publishing → add a "Trusted Publisher":
#     project: talkthrough-mcp, owner: korovin-aa97,
#     repository: talkthrough-mcp, workflow: release.yml, environment: pypi
# No API tokens are stored anywhere.

name: release

on:
  push:
    tags: ["v*"]

# Least privilege by default; publish-pypi and github-release raise their
# own job-level permissions explicitly below.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - run: uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
